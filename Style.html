<style>

body{

  margin:0;
  padding:0;

  background:#f5f3ef;

  font-family:Arial,sans-serif;

  color:#2b2b2b;

}

.container{

  padding:20px;

}

.header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:20px;

}

.header h1{

  margin:0;

  font-size:26px;

  color:#6b4423;

  font-weight:700;

}

.sub-title{

  margin-top:6px;

  color:#777;

  font-size:13px;

}

.tabs{

  display:flex;

  gap:12px;

  margin-bottom:20px;

}

.tab-btn{

  border:none;

  padding:12px 20px;

  border-radius:14px;

  cursor:pointer;

  font-size:14px;

  font-weight:bold;

  transition:0.25s;

  background:#e7ddd2;

  color:#6b4b35;

}

.tab-btn.active{

  background:#7a4b2a;

  color:white;

  box-shadow:
    0 6px 16px rgba(122,75,42,0.35);

}

.cards{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

  gap:14px;

  margin-bottom:20px;

}

.card{

  background:white;

  padding:16px;

  border-radius:16px;

  box-shadow:
    0 2px 8px rgba(0,0,0,0.08);

}

.card h3{

  margin:0;

  font-size:13px;

  color:#666;

}

.card p{

  margin-top:10px;

  font-size:22px;

  font-weight:bold;

}

.ai-card{

  border-left:
    5px solid #7a4b2a;

}

.health-good{

  color:#059669;

}

.risk-high{

  color:#dc2626;

}

.alert-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

  gap:12px;

  margin-bottom:20px;

}

.alert-card{

  padding:18px;

  border-radius:16px;

  color:white;

}

.alert-card.red{

  background:#dc2626;

}

.alert-card.orange{

  background:#ea580c;

}

.alert-card.green{

  background:#059669;

}

.alert-title{

  font-size:13px;

}

.alert-number{

  margin-top:10px;

  font-size:26px;

  font-weight:bold;

}

.chart-card,
.table-card{

  background:white;

  padding:18px;

  border-radius:16px;

  margin-bottom:20px;

  box-shadow:
    0 2px 8px rgba(0,0,0,0.08);

}

table{

  width:100%;

  border-collapse:collapse;

  margin-top:10px;

}

table th{

  background:#f3eee7;

  padding:10px;

  text-align:left;

  font-size:13px;

}

table td{

  padding:10px;

  border-top:1px solid #eee;

  font-size:13px;

}

@media(max-width:768px){

  .cards{

    grid-template-columns:
      1fr 1fr;

  }

}

</style>
